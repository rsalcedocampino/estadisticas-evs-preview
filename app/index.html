<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observatorio de Electromovilidad y Energía · Chile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#F4F7FB; --card:#fff; --ink:#0F172A; --muted:#64748B; --line:#E2E8F0;
  --primary:#2563EB; --primary-d:#1E40AF; --green:#16A34A; --orange:#F59E0B; --red:#EF4444; --purple:#7C3AED; --teal:#0D9488;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
a{text-decoration:none;color:inherit;}
.wrap{max-width:1320px;margin:0 auto;padding:0 22px;}
/* NAVBAR */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.nav-in{display:flex;align-items:center;gap:14px;min-height:62px;padding:8px 0;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;color:var(--primary-d);flex-shrink:0;}
.brand img{height:34px;width:auto;display:block;}
.nav-links{display:flex;gap:2px;margin-left:10px;flex:1;flex-wrap:wrap;}
.nav-links a{padding:7px 10px;border-radius:8px;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap;}
.nav-links a:hover{background:#F1F5F9;color:var(--ink);}
.nav-links a.active{color:var(--primary);background:#EFF6FF;}
.nav-cta{display:flex;gap:8px;flex-shrink:0;}
.btn{padding:8px 15px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;border:1.5px solid transparent;transition:.15s;}
.btn-ghost{border-color:var(--line);color:var(--ink);background:#fff;}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-d);}
.nav-burger{display:none;font-size:22px;cursor:pointer;background:none;border:none;color:var(--ink);}
/* SECTIONS */
#main{display:block;min-height:72vh;}
section.page{display:none;padding:26px 0 50px;}
section.page.active{display:block;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{margin-bottom:22px;}
.page-head h1{font-size:30px;font-weight:800;letter-spacing:-.5px;}
.page-head .sub{color:var(--muted);font-size:14.5px;margin-top:4px;max-width:680px;}
.page-head .meta{display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
.pill{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-weight:600;}
.filterbar{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:18px;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.fgroup label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.fgroup select{padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink);background:#fff;cursor:pointer;min-width:200px;}
.fgroup select:focus{outline:none;border-color:var(--primary);}
.filterbar .btn{padding:9px 14px;}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tabs button{padding:9px 16px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer;border-radius:10px;transition:.15s;box-shadow:0 1px 2px rgba(15,23,42,.04);}
.tabs button:not(.active){background:#EEF2F7;}
.tabs button:not(.active)::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:#94A3B8;margin-right:7px;vertical-align:middle;}
.tabs button:hover:not(.active){background:#E0E7EF;color:var(--ink);border-color:#CBD5E1;}
.tabs button.active{color:#fff;background:var(--primary);border-color:var(--primary);box-shadow:0 4px 12px rgba(37,99,235,.28);}
.card{position:relative;}
.datechip{position:absolute;top:15px;right:16px;font-size:10.5px;font-weight:700;color:var(--muted);background:#F1F5F9;border:1px solid var(--line);border-radius:20px;padding:3px 9px;white-space:nowrap;}
.card h3{padding-right:120px;}
.subtitle{font-size:13px;color:var(--muted);font-weight:600;margin:2px 0 14px;}
.srcleg{margin-top:16px;background:#F8FAFC;border:1px solid var(--line);border-radius:14px;padding:15px 18px;font-size:13px;color:var(--muted);}
.srcleg b{color:var(--ink);}
.srcleg ul{margin:8px 0 0;padding-left:18px;line-height:1.9;}
.srcleg a{color:var(--primary);font-weight:700;cursor:pointer;}
.srcleg a:hover{text-decoration:underline;}
.srcdate{display:block;margin-top:10px;font-size:12px;color:#94A3B8;}
.kbar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
.kbar{background:#fff;border:1px solid var(--line);border-left:4px solid #2563EB;border-radius:12px;padding:15px 16px;box-shadow:var(--shadow);}
.kbar-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.kbar-lbl{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.4px;line-height:1.25;text-transform:uppercase;}
.kbar-i{flex-shrink:0;width:16px;height:16px;border-radius:50%;border:1.5px solid #CBD5E1;color:#94A3B8;font-size:10px;font-weight:800;font-style:italic;display:flex;align-items:center;justify-content:center;cursor:help;}
.kbar-val{font-size:27px;font-weight:800;letter-spacing:-1px;margin-top:8px;line-height:1;}
.kbar-sub{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.3;}
.kbar-delta{font-size:11px;font-weight:700;color:var(--green);margin-top:6px;}
@media(max-width:1100px){.kbar-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:680px){.kbar-grid{grid-template-columns:repeat(2,1fr);}}
/* GRID + CARDS */
.grid{display:grid;gap:16px;}
.g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(4,1fr);}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px;}
.card h3{font-size:15px;font-weight:800;}
.card .csub{color:var(--muted);font-size:12.5px;margin-top:2px;}
.card-src{font-size:11px;color:#94A3B8;margin-top:10px;font-style:italic;}
.insight{display:flex;gap:11px;align-items:flex-start;background:#EFF6FF;border:1px solid #DBEAFE;border-radius:12px;padding:12px 15px;margin-top:16px;}
.insight .ic{width:30px;height:30px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;}
.insight b{color:var(--primary-d);}
/* KPI */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:17px 18px;position:relative;overflow:hidden;}
.kpi .top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.kpi .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kpi .lbl{font-size:13px;font-weight:700;color:var(--muted);line-height:1.25;}
.kpi .val{font-size:30px;font-weight:800;letter-spacing:-1px;}
.kpi .val small{font-size:15px;font-weight:700;color:var(--muted);margin-left:3px;}
.kpi .delta{font-size:12px;font-weight:700;margin-top:3px;}
.kpi .delta.up{color:var(--green);} .kpi .delta.down{color:var(--red);}
.kpi .spark{margin-top:10px;}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0;}
.legrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;}
.legrow .nm{flex:1;font-weight:600;} .legrow .vl{font-weight:700;color:var(--muted);}
.rank .bar{height:9px;border-radius:6px;background:#EFF2F7;overflow:hidden;margin-top:5px;}
.rank .bar i{display:block;height:100%;background:linear-gradient(90deg,#3B82F6,#2563EB);border-radius:6px;}
.soon{text-align:center;padding:70px 20px;color:var(--muted);}
.soon .big{font-size:46px;margin-bottom:8px;}
/* HERO */
.hero{background:linear-gradient(135deg,#1E3A8A,#2563EB 60%,#0D9488);border-radius:22px;padding:48px 42px;color:#fff;position:relative;overflow:hidden;}
.hero h1{font-size:40px;font-weight:800;letter-spacing:-1px;line-height:1.1;max-width:620px;}
.hero p{font-size:16px;opacity:.92;margin-top:14px;max-width:560px;}
.hero .herobtns{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;}
.hero .btn-primary{background:#fff;color:var(--primary-d);}
.hero .btn-ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);color:#fff;}
.feat{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;}
.feat .f{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.feat .f .fi{font-size:22px;}
.feat .f h4{font-size:15px;margin:8px 0 4px;}
.feat .f p{font-size:12.5px;color:var(--muted);}
#mapwrap{height:480px;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
.maplegend{display:flex;flex-direction:column;gap:7px;}
footer{border-top:1px solid var(--line);background:#fff;padding:22px 0;margin-top:30px;color:var(--muted);font-size:12.5px;}
@media(max-width:980px){
  .g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:1fr;} .g2{grid-template-columns:1fr;}
  .feat{grid-template-columns:repeat(2,1fr);}
  .nav-links{display:none;position:absolute;top:62px;left:0;right:0;background:#fff;border-bottom:1px solid var(--line);flex-direction:column;padding:8px;}
  .nav-links.open{display:flex;}
  .nav-burger{display:block;}
  .nav-cta{margin-left:auto;}
  .hero h1{font-size:30px;} .page-head h1{font-size:24px;}
}
</style>
</head>
